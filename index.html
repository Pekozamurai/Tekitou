<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio & YouTube LP</title>
    <style>
        /* --- 基本設定（ダークテーマ & 浅葱色のベース） --- */
        :root {
            --bg-color: #12181a;       /* 深みのあるダークグレー */
            --card-bg: #1e2629;        /* カード背景 */
            --text-color: #e0e6e8;     /* 明るいグレー（目に優しい） */
            --accent-color: #00a3af;   /* 浅葱色（あさぎいろ） */
            --accent-hover: #00848e;   /* 浅葱色（ホバー用） */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            line-height: 1.6;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
            transition: color 0.3s;
        }

        a:hover {
            color: var(--accent-hover);
        }

        /* --- レイアウト構造 --- */
        header {
            background-color: var(--card-bg);
            border-bottom: 2px solid var(--accent-color);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 1.5rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        section {
            margin-bottom: 4rem;
            padding-top: 1rem;
        }

        h2 {
            font-size: 1.8rem;
            color: var(--accent-color);
            border-left: 4px solid var(--accent-color);
            padding-left: 0.75rem;
            margin-bottom: 1.5rem;
        }

        /* --- 各セクションのスタイル --- */
        
        /* 1. プロフィール */
        .profile-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .profile-title {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            color: #ffffff;
        }

        .profile-text {
            margin-bottom: 1rem;
        }

        /* 2. YouTube宣伝 & 埋め込み */
        .youtube-section {
            text-align: center;
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 アスペクト比 */
            margin-bottom: 1.5rem;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .btn-channel {
            display: inline-block;
            background-color: var(--accent-color);
            color: #ffffff;
            padding: 0.75rem 2rem;
            font-weight: bold;
            border-radius: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: background-color 0.3s, transform 0.2s;
        }

        .btn-channel:hover {
            background-color: var(--accent-hover);
            color: #ffffff;
            transform: translateY(-2px);
        }

        /* 3. ミニゲーム（恐竜風ジャンプゲーム） */
        .game-area {
            background-color: var(--card-bg);
            border: 2px solid var(--accent-color);
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
        }

        #gameCanvas {
            background-color: #253033;
            display: block;
            margin: 1rem auto;
            border-radius: 4px;
            max-width: 100%;
        }

        .game-instruction {
            font-size: 0.9rem;
            color: #a0afb3;
            margin-bottom: 0.5rem;
        }

        #startBtn {
            background-color: transparent;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            padding: 0.5rem 1.5rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }

        #startBtn:hover {
            background-color: var(--accent-color);
            color: #ffffff;
        }

        footer {
            text-align: center;
            padding: 2rem;
            background-color: var(--card-bg);
            color: #708084;
            font-size: 0.9rem;
            border-top: 1px solid #253033;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo">My Space</div>
            <nav>
                <ul>
                    <li><a href="Pekozamurai">Profile</a></li>
                    <li><a href="#youtube">YouTube</a></li>
                    <li><a href="#ミニゲーム">Mini Game</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="container">

        <section id="profile">
            <h2>Profile</h2>
            <div class="profile-card">
                <h3 class="profile-title">こんにちは、お越しいただきありがとうございます！</h3>
                <p class="profile-text">
                    適当です
                </p>
                <p class="profile-text">
                    適当な人です。
                </p>
            </div>
        </section>

        <section id="youtube" class="youtube-section">
            <h2>YouTube Channel</h2>
            
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/fcFmKoJbPm4?si=-BNl6bv70avTEA7S" title="YouTube video player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
            </div>

            <p style="margin-bottom: 1.5rem;">
                主にPythonのコーディングを解説しています<br>
                AIモデル構築のプロセスなども解説していく予定です。
            </p>

            <a href="https://www.youtube.com/@Pekozamurai/featured" target="_blank" rel="noopener noreferrer" class="btn-channel">
                チャンネルを見に行く
            </a>
        </section>

        <section id="game">
            <h2>Mini Game</h2>
            <div class="game-area">
                <p class="game-instruction">画面をクリック、または【スペースキー】でジャンプして障害物をよけよう！</p>
                <canvas id="gameCanvas" width="600" height="200"></canvas>
                <button id="startBtn">ゲームスタート</button>
            </div>
        </section>

    </div>

    <footer>
        <p>&copy; 2026 My Space. All Rights Reserved.</p>
    </footer>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const startBtn = document.getElementById("startBtn");

        let gameLoop;
        let isPlaying = false;
        let score = 0;

        // プレイヤー（四角形）
        const player = {
            x: 50,
            y: 150,
            width: 30,
            height: 30,
            gravity: 0.6,
            velocity: 0,
            jumpStrength: -10,
            isGrounded: true
        };

        // 障害物（サボテン風の四角形）
        let obstacles = [];
        let spawnTimer = 0;

        function resetGame() {
            score = 0;
            player.y = 150;
            player.velocity = 0;
            player.isGrounded = true;
            obstacles = [];
            spawnTimer = 0;
        }

        function jump() {
            if (player.isGrounded && isPlaying) {
                player.velocity = player.jumpStrength;
                player.isGrounded = false;
            }
        }

        // キーボード操作（スペースキー）
        window.addEventListener("keydown", (e) => {
            if (e.code === "Space") {
                e.preventDefault(); // ブラウザのスクロール防止
                jump();
            }
        });

        // 画面タップ・クリック操作
        canvas.addEventListener("click", () => {
            jump();
        });

        function update() {
            // プレイヤーの物理挙動
            player.velocity += player.gravity;
            player.y += player.velocity;

            // 地面との当たり判定
            if (player.y >= 150) {
                player.y = 150;
                player.velocity = 0;
                player.isGrounded = true;
            }

            // 障害物の生成（ランダムな間隔）
            spawnTimer++;
            if (spawnTimer > Math.random() * 60 + 90) {
                obstacles.push({
                    x: canvas.width,
                    y: 150,
                    width: 20,
                    height: 30,
                    speed: 5 + score * 0.1 // スコアが上がると少し速くなる
                });
                spawnTimer = 0;
            }

            // 障害物の移動とコリジョンチェック
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= obstacles[i].speed;

                // 衝突判定
                if (
                    player.x < obstacles[i].x + obstacles[i].width &&
                    player.x + player.width > obstacles[i].x &&
                    player.y < obstacles[i].y + obstacles[i].height &&
                    player.y + player.height > obstacles[i].y
                ) {
                    gameOver();
                }

                // 画面外に出たら削除＆スコア加算
                if (obstacles[i].x + obstacles[i].width < 0) {
                    obstacles.splice(i, 1);
                    score++;
                }
            }
        }

        function draw() {
            // キャンバスのクリア
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 地平線（浅葱色のライン）
            ctx.strokeStyle = "#00a3af";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, 180);
            ctx.lineTo(canvas.width, 180);
            ctx.stroke();

            // プレイヤーの描画（浅葱色）
            ctx.fillStyle = "#00a3af";
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // 障害物の描画（少し明るいグレー）
            ctx.fillStyle = "#a0afb3";
            for (let obs of obstacles) {
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            }

            // スコア表示
            ctx.fillStyle = "#e0e6e8";
            ctx.font = "16px sans-serif";
            ctx.fillText("SCORE: " + score, 20, 30);
        }

        function gameTick() {
            if (!isPlaying) return;
            update();
            draw();
            gameLoop = requestAnimationFrame(gameTick);
        }

        function gameOver() {
            isPlaying = false;
            cancelAnimationFrame(gameLoop);
            startBtn.style.display = "inline-block";
            startBtn.innerText = "もう一度プレイ";
            
            // ゲームオーバー画面の簡易テキスト表示
            ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff4d4d";
            ctx.font = "bold 24px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);
            ctx.textAlign = "start"; // 元に戻す
        }

        startBtn.addEventListener("click", () => {
            startBtn.style.display = "none";
            isPlaying = true;
            resetGame();
            gameTick();
        });

        // 初回読み込み時に初期画面を描画
        draw();
    </script>
</body>
</html>
