<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile & Portfolio</title>
    <style>
        /* --- 基本スタイルの定義 (モダン＆スタイリッシュ) --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            color: #ffffff;
            line-height: 1.8;
            overflow-x: hidden;
            /* 初期背景（スクロールで変化します） */
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            background-attachment: fixed;
            transition: background 0.8s ease;
        }

        /* 全体のレイアウト幅制限 */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* セクション共通スタイル */
        section {
            padding: 100px 0;
            opacity: 0;
            transform: translateY(40px);
            transition: all 1.0s ease;
        }

        /* スクロール時にふわっと表示させるクラス */
        section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 30px;
            letter-spacing: 0.1rem;
            position: relative;
            display: inline-block;
        }

        h2::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -8px;
            width: 50px;
            height: 3px;
            background: #6366f1;
            border-radius: 2px;
        }

        /* --- 1. メインビジュアル / 自己紹介 --- */
        #profile {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding-top: 50px;
        }

        .profile-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .name {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 1.2rem;
            color: #a5b4fc;
            font-weight: 500;
        }

        .bio {
            font-size: 1.05rem;
            color: #cbd5e1;
            max-width: 600px;
        }

        /* --- 2. YouTubeセクション --- */
        #youtube {
            min-height: 80vh;
        }

        .youtube-link-btn {
            display: inline-block;
            margin-bottom: 30px;
            padding: 12px 30px;
            background-color: #ff0000;
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            border-radius: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
        }

        .youtube-link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 0, 0, 0.5);
        }

        /* 動画埋め込みのレスポンシブ対応（16:9） */
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* --- 3. コメント機能セクション --- */
        #comments {
            min-height: 80vh;
        }

        .comment-placeholder {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            color: #94a3b8;
        }

        /* フッター */
        footer {
            text-align: center;
            padding: 40px 0;
            font-size: 0.9rem;
            color: #64748b;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* レスポンシブ対応 */
        @media (max-width: 768px) {
            .name { font-size: 2.2rem; }
            section { padding: 60px 0; }
        }
    </style>
</head>
<body>

    <section id="profile" class="visible">
        <div class="container">
            <div class="profile-wrapper">
                <h1 class="name">Pekozamurai</h1>
                <p class="tagline">Video Editor & AI engineering</p>
                <p class="bio">
                    こけしが降って来て少しハッピー
                </p>
            </div>
        </div>
    </section>

    <section id="youtube">
        <div class="container">
            <h2>Latest Video</h2>
            <a href="https://www.youtube.com/@Pekozamurai" target="_blank" class="youtube-link-btn">
                YouTube Channel
            </a>
            <div class="video-container">
                <iframe 
                    src="https://www.youtube.com/embed?listType=search&list=[UUxNaSBndxmQ9j8O4pXFXmzA]
" 
                    title="YouTube video player" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    allowfullscreen>
                </iframe>
            </div>
        </div>
    </section>

    <section id="comments">
        <div class="container">
            <h2>Comments</h2>
            <div class="comment-placeholder">
                <p>WIP</p>
                <p style="font-size: 0.85rem; margin-top: 10px;">未実装</p>
                
                </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 Your Name. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // 1. スクロールに応じて背景色（グラデーション）を滑らかに変える
        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const scrollPercent = scrollTop / docHeight;

            // スクロール量に応じて3つのフェーズで背景色を変化させる
            let color1, color2;

            if (scrollPercent < 0.5) {
                // セクション1から2への変化 (ネイビーからディープパープル・ボルドーへ)
                color1 = interpolateColor('#0f172a', '#1e1b4b', scrollPercent * 2);
                color2 = interpolateColor('#1e1b4b', '#311042', scrollPercent * 2);
            } else {
                // セクション2から3への変化 (ディープパープルからダークティール・黒へ)
                const p = (scrollPercent - 0.5) * 2;
                color1 = interpolateColor('#1e1b4b', '#022c22', p);
                color2 = interpolateColor('#311042', '#090d16', p);
            }

            document.body.style.background = `linear-gradient(135deg, ${color1} 0%, ${color2} 100%)`;
            document.body.style.backgroundAttachment = 'fixed';
        });

        // カラーの補間計算用ヘルパー関数
        function interpolateColor(color1, color2, factor) {
            const c1 = parseHex(color1);
            const c2 = parseHex(color2);
            const r = Math.round(c1.r + factor * (c2.r - c1.r));
            const g = Math.round(c1.g + factor * (c2.g - c1.g));
            const b = Math.round(c1.b + factor * (c2.b - c1.b));
            return `rgb(${r}, ${g}, ${b})`;
        }

        function parseHex(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return { r, g, b };
        }


        // 2. スクロールに合わせてセクションをふわっと表示させる（Intersection Observer）
        const sections = document.querySelectorAll('section');
        const options = {
            root: null,
            threshold: 0.15 // 15%見えたら発火
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, options);

        sections.forEach(section => {
            observer.observe(section);
        });
    </script>
</body>
</html>
